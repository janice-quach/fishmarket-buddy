<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Fish Market Buddy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #fef6e4;
  --card: #fff;
  --pink: #f582ae;
  --blue: #8bd3dd;
  --orange: #f3d2c1;
  --green: #8ac926;
  --purple: #b8c1ec;
  --navy: #232946;
  --text: #232946;
  --muted: #656886;
  --border: 3px solid var(--navy);
}

html, body {
  height: 100%;
  font-family: 'Press Start 2P', monospace;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}

.screen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100dvh;
  padding: 20px;
  text-align: center;
  gap: 16px;
}
.screen.active { display: flex; }
.screen.scrollable { overflow-y: auto; justify-content: flex-start; padding-top: 40px; padding-bottom: 80px; }

h1 { font-size: 14px; line-height: 1.8; }
h2 { font-size: 11px; margin-bottom: 8px; }

.fish-icon { font-size: 48px; animation: bob 2s ease-in-out infinite; }
@keyframes bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

.btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  padding: 14px 24px;
  border: var(--border);
  background: var(--pink);
  color: var(--navy);
  cursor: pointer;
  transition: transform 0.1s;
  text-transform: uppercase;
  box-shadow: 4px 4px 0 var(--navy);
}
.btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--navy); }
.btn:disabled { opacity: 0.4; pointer-events: none; }
.btn.secondary { background: var(--blue); }
.btn.small { font-size: 8px; padding: 10px 16px; }

.input-wrap { width: 100%; max-width: 320px; }
.input-wrap input {
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  width: 100%;
  padding: 12px;
  border: var(--border);
  background: var(--card);
  color: var(--navy);
  outline: none;
}

.avatar-area { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.avatar-area canvas { border: var(--border); image-rendering: pixelated; background: var(--card); }

.food-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  width: 100%;
  max-width: 320px;
}
.food-chip {
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  padding: 10px 6px;
  border: var(--border);
  background: var(--card);
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
  line-height: 1.4;
}
.food-chip.selected { background: var(--blue); box-shadow: inset 0 0 0 2px var(--navy); }
.food-chip .emoji { font-size: 18px; display: block; margin-bottom: 4px; font-family: system-ui; }

.card-stack { position: relative; width: 280px; height: 360px; }
.buddy-card {
  position: absolute; width: 100%; height: 100%;
  background: var(--card); border: var(--border);
  box-shadow: 6px 6px 0 var(--navy);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 12px; padding: 20px;
  transition: transform 0.4s ease, opacity 0.4s ease;
  user-select: none;
}
.buddy-card canvas { image-rendering: pixelated; border: var(--border); }
.buddy-card .name { font-size: 11px; }
.buddy-card .foods { font-size: 16px; font-family: system-ui; display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
.buddy-card .tagline { font-size: 7px; color: var(--muted); line-height: 1.6; }

.swipe-buttons { display: flex; gap: 16px; margin-top: 12px; }
.swipe-btn {
  width: 60px; height: 60px;
  border: var(--border); border-radius: 50%;
  font-size: 24px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; box-shadow: 3px 3px 0 var(--navy);
  transition: transform 0.1s; font-family: system-ui;
}
.swipe-btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--navy); }
.swipe-btn.nope { background: var(--orange); }
.swipe-btn.yep { background: var(--green); }

.swipe-hint {
  font-size: 7px; color: var(--muted);
  position: absolute; top: 50%; transform: translateY(-50%);
  pointer-events: none; opacity: 0; transition: opacity 0.2s;
  font-weight: bold; font-family: 'Press Start 2P', monospace;
}
.swipe-hint.left { left: -60px; color: var(--pink); }
.swipe-hint.right { right: -60px; color: var(--green); }

#match-screen { background: var(--navy); color: var(--card); }
#match-screen h2 { font-size: 14px; color: var(--pink); animation: pulse 0.6s ease-in-out infinite alternate; }
@keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }
.match-avatars { display: flex; gap: 20px; align-items: center; }
.match-avatars canvas { image-rendering: pixelated; border: 3px solid var(--pink); }
.match-heart { font-size: 32px; font-family: system-ui; animation: bob 1s ease-in-out infinite; }
.match-foods { font-size: 8px; color: var(--blue); line-height: 1.8; }

.matches-list { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 10px; }
.match-row { display: flex; align-items: center; gap: 12px; padding: 12px; border: var(--border); background: var(--card); }
.match-row canvas { image-rendering: pixelated; }
.match-row .info { text-align: left; }
.match-row .info .name { font-size: 9px; }
.match-row .info .foods { font-size: 14px; font-family: system-ui; margin-top: 4px; }
.no-matches { font-size: 8px; color: var(--muted); line-height: 1.8; }

.nav-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: none; justify-content: center; gap: 20px;
  padding: 12px; background: var(--card); border-top: var(--border); z-index: 100;
}
.nav-bar.visible { display: flex; }
.nav-btn {
  font-family: 'Press Start 2P', monospace; font-size: 8px;
  padding: 8px 14px; border: none; background: none; cursor: pointer; color: var(--muted);
}
.nav-btn.active { color: var(--pink); }

.loading { font-size: 8px; color: var(--muted); animation: blink 1s infinite; }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

.people-count { font-size: 7px; color: var(--muted); }

.confetti-piece { position: fixed; width: 8px; height: 8px; pointer-events: none; z-index: 200; }
.status-msg { font-size: 8px; color: var(--green); min-height: 20px; }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash" class="screen active">
  <div class="fish-icon">🐟</div>
  <h1>find your<br>fish market<br>buddy</h1>
  <p style="font-size:8px;color:var(--muted);line-height:1.6">make a profile.<br>swipe for your crew.</p>
  <button class="btn" onclick="startApp()">let's go</button>
</div>

<!-- PROFILE -->
<div id="profile" class="screen scrollable">
  <h2>who are you?</h2>
  <div class="input-wrap">
    <input id="name-input" type="text" placeholder="your name" maxlength="12" autocomplete="off">
  </div>
  <div class="avatar-area">
    <canvas id="avatar-canvas" width="128" height="128"></canvas>
    <button class="btn small secondary" onclick="regenAvatar()">↻ new buddy</button>
  </div>
  <h2>what do you crave?</h2>
  <div class="food-grid" id="food-grid"></div>
  <h2>your vibe?</h2>
  <div class="input-wrap">
    <input id="tagline-input" type="text" placeholder="e.g. here for the oysters" maxlength="40" autocomplete="off">
  </div>
  <button class="btn" onclick="saveProfile()" style="margin-top:8px">find my crew</button>
</div>

<!-- BROWSE -->
<div id="browse" class="screen">
  <h2>swipe your crew</h2>
  <div class="people-count" id="people-count"></div>
  <div class="card-stack" id="card-stack">
    <span class="swipe-hint left" id="hint-nope">nah</span>
    <span class="swipe-hint right" id="hint-yep">yep!</span>
  </div>
  <div class="swipe-buttons">
    <button class="swipe-btn nope" onclick="swipeNo()">✕</button>
    <button class="swipe-btn yep" onclick="swipeYes()">♥</button>
  </div>
</div>

<!-- MATCH -->
<div id="match-screen" class="screen">
  <h2>it's a match!</h2>
  <div class="match-avatars" id="match-avatars"></div>
  <div class="match-heart">❤️</div>
  <div class="match-foods" id="match-foods"></div>
  <button class="btn" onclick="continueAfterMatch()">keep swiping</button>
  <button class="btn small secondary" onclick="showScreen('matches')">see matches</button>
</div>

<!-- MATCHES LIST -->
<div id="matches" class="screen scrollable">
  <h2>your buddies</h2>
  <div class="matches-list" id="matches-list"></div>
  <button class="btn small" onclick="showScreen('browse')" style="margin-top:12px">back to swiping</button>
</div>

<!-- MY CARD -->
<div id="me" class="screen scrollable">
  <h2>your card</h2>
  <div class="avatar-area">
    <canvas id="me-avatar" width="128" height="128"></canvas>
    <button class="btn small secondary" onclick="regenMyAvatar()">↻ new look</button>
  </div>
  <div class="input-wrap">
    <input id="me-name" type="text" placeholder="your name" maxlength="12" autocomplete="off">
  </div>
  <h2>cravings</h2>
  <div class="food-grid" id="me-food-grid"></div>
  <h2>your vibe?</h2>
  <div class="input-wrap">
    <input id="me-tagline" type="text" placeholder="e.g. here for the oysters" maxlength="40" autocomplete="off">
  </div>
  <div class="status-msg" id="me-status"></div>
  <button class="btn" onclick="updateProfile()" style="margin-top:8px">save changes</button>
</div>

<!-- NAV -->
<div class="nav-bar" id="nav-bar">
  <button class="nav-btn" onclick="showScreen('browse')">🐟 swipe</button>
  <button class="nav-btn" onclick="showScreen('matches')">💕 buddies</button>
  <button class="nav-btn" onclick="showScreen('me')">🪞 me</button>
</div>

<script>
const API = 'https://fishmarket-buddy-api.janicequach.workers.dev';

let myProfileId = localStorage.getItem('fm_profile_id');
let allProfiles = [];
let browsableProfiles = [];
let currentBrowseIdx = 0;
let myLikedIds = new Set();
let matchedProfiles = [];

// ── API HELPERS ──
async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  return res.json();
}

// ── FOODS ──
const FOODS = [
  { id: 'sashimi', emoji: '🍣', label: 'sashimi' },
  { id: 'oysters', emoji: '🦪', label: 'oysters' },
  { id: 'fishnchips', emoji: '🍟', label: 'fish & chips' },
  { id: 'lobster', emoji: '🦞', label: 'lobster' },
  { id: 'crab', emoji: '🦀', label: 'crab' },
  { id: 'prawns', emoji: '🦐', label: 'prawns' },
  { id: 'calamari', emoji: '🦑', label: 'calamari' },
  { id: 'poke', emoji: '🥣', label: 'poke bowl' },
  { id: 'tacos', emoji: '🌮', label: 'fish tacos' },
];
function foodEmoji(id) { const f = FOODS.find(x => x.id === id); return f ? f.emoji : ''; }

// ── PIXEL AVATARS ──
const ANIMALS = [
  { name: 'cat', pixels: ['....1111....','...111111...','..11....11..','.11.1..1.11.','.11......11.','..11....11..','...111111...','....1111....','...111111...','..11111111..','..11111111..','...111111...'] },
  { name: 'fish', pixels: ['............','....1111....','...111111...','..1111.1111.','.11111111111','.11111111111','..1111.1111.','...111111...','....1111....','............','............','............'] },
  { name: 'octopus', pixels: ['....1111....','...111111...','..11.11.11..','..11111111..','..11111111..','...111111...','..11.11.11..','.11..11..11.','.1...11...1.','1....11....1','............','............'] },
  { name: 'crab', pixels: ['1..........1','.1........1.','.1..1111..1.','..1.1..1.1..','..11111111..','..11.11.11..','..11111111..','...111111...','..1..11..1..','.1...11...1.','............','............'] },
  { name: 'penguin', pixels: ['....1111....','...111111...','..11.11.11..','..11111111..','.1.222222.1.','.1.222222.1.','...222222...','...111111...','...111111...','..33....33..','..333..333..','............'] },
  { name: 'seal', pixels: ['............','...111111...','..11111111..','.11.1..1.11.','.1111..1111.','.111.11.111.','..11111111..','...111111...','....111111..','.....11111..','......1111..','............'] },
  { name: 'shrimp', pixels: ['.....111....','....11.11...','...11...1...','...1....1...','..11...1....','..1...1.....','..1..1......','..1.1.......','...1........','..1.........','............','............'] },
  { name: 'puffer', pixels: ['....1111....','..11111111..','.1111111111.','.11.1111.11.','111111111111','111111111111','.1111111111.','.1111111111.','..11111111..','....1111....','............','............'] },
];

const PALETTES = [
  { body: '#f582ae', accent: '#fef6e4', eye: '#232946', extra: '#f3d2c1' },
  { body: '#8bd3dd', accent: '#fef6e4', eye: '#232946', extra: '#b8c1ec' },
  { body: '#f3d2c1', accent: '#fef6e4', eye: '#232946', extra: '#f582ae' },
  { body: '#8ac926', accent: '#fef6e4', eye: '#232946', extra: '#f3d2c1' },
  { body: '#b8c1ec', accent: '#fff', eye: '#232946', extra: '#f582ae' },
  { body: '#ffbe0b', accent: '#fef6e4', eye: '#232946', extra: '#fb5607' },
  { body: '#ff006e', accent: '#fef6e4', eye: '#232946', extra: '#8338ec' },
  { body: '#3a86ff', accent: '#fef6e4', eye: '#232946', extra: '#ff006e' },
  { body: '#06d6a0', accent: '#fef6e4', eye: '#232946', extra: '#118ab2' },
  { body: '#e07a5f', accent: '#fef6e4', eye: '#232946', extra: '#3d405b' },
];

let myAvatarData = null;

function drawAvatar(canvas, animalIdx, paletteIdx, size) {
  const ctx = canvas.getContext('2d');
  const animal = ANIMALS[animalIdx];
  const palette = PALETTES[paletteIdx];
  const cellSize = size / 12;
  ctx.clearRect(0, 0, size, size);
  ctx.fillStyle = '#fef6e4';
  ctx.fillRect(0, 0, size, size);
  const colorMap = { '1': palette.body, '2': palette.accent, '3': palette.extra };
  for (let y = 0; y < animal.pixels.length; y++) {
    for (let x = 0; x < animal.pixels[y].length; x++) {
      const color = colorMap[animal.pixels[y][x]];
      if (color) { ctx.fillStyle = color; ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize); }
    }
  }
  const eyes = { cat: [[3,3],[8,3]], fish: [[4,3]], seal: [[3,3],[8,3]], puffer: [[3,3],[8,3]] };
  if (eyes[animal.name]) {
    ctx.fillStyle = palette.eye;
    eyes[animal.name].forEach(([ex, ey]) => ctx.fillRect(ex * cellSize, ey * cellSize, cellSize, cellSize));
  }
}

function regenAvatar() {
  myAvatarData = {
    animalIdx: Math.floor(Math.random() * ANIMALS.length),
    paletteIdx: Math.floor(Math.random() * PALETTES.length),
  };
  drawAvatar(document.getElementById('avatar-canvas'), myAvatarData.animalIdx, myAvatarData.paletteIdx, 128);
}
regenAvatar();

// ── FOOD GRID ──
const foodGrid = document.getElementById('food-grid');
const selectedFoods = new Set();
FOODS.forEach(f => {
  const chip = document.createElement('div');
  chip.className = 'food-chip';
  chip.innerHTML = `<span class="emoji">${f.emoji}</span>${f.label}`;
  chip.onclick = () => {
    if (selectedFoods.has(f.id)) { selectedFoods.delete(f.id); chip.classList.remove('selected'); }
    else { selectedFoods.add(f.id); chip.classList.add('selected'); }
  };
  foodGrid.appendChild(chip);
});

// ── SCREENS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const nav = document.getElementById('nav-bar');
  const showNav = ['browse', 'matches', 'me'].includes(id);
  nav.classList.toggle('visible', showNav);
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (id === 'browse') { nav.children[0].classList.add('active'); loadBrowse(); }
  if (id === 'matches') { nav.children[1].classList.add('active'); loadMatches(); }
  if (id === 'me') { nav.children[2].classList.add('active'); loadMe(); }
}

function startApp() {
  if (myProfileId) { showScreen('browse'); }
  else { showScreen('profile'); }
}

// ── PROFILE ──
async function saveProfile() {
  const name = document.getElementById('name-input').value.trim();
  if (!name) { document.getElementById('name-input').style.borderColor = '#f582ae'; return; }
  if (selectedFoods.size === 0) return;

  const tagline = document.getElementById('tagline-input').value.trim() || null;

  try {
    const profile = await api('/profiles', {
      method: 'POST',
      body: JSON.stringify({
        name,
        foods: [...selectedFoods],
        animal_idx: myAvatarData.animalIdx,
        palette_idx: myAvatarData.paletteIdx,
        tagline,
      }),
    });
    myProfileId = profile.id;
    localStorage.setItem('fm_profile_id', profile.id);
    showScreen('browse');
  } catch (e) {
    console.error('save failed', e);
  }
}

// ── BROWSE ──
async function loadBrowse() {
  const stack = document.getElementById('card-stack');
  stack.querySelectorAll('.buddy-card').forEach(c => c.remove());

  const loadingCard = document.createElement('div');
  loadingCard.className = 'buddy-card';
  loadingCard.innerHTML = '<div class="loading">loading crew...</div>';
  stack.appendChild(loadingCard);

  try {
    const [profiles, likedIds] = await Promise.all([
      api('/profiles'),
      api('/likes/' + myProfileId),
    ]);

    allProfiles = profiles;
    myLikedIds = new Set(likedIds);

    // Parse foods from JSON string if needed
    allProfiles.forEach(p => {
      if (typeof p.foods === 'string') p.foods = JSON.parse(p.foods);
    });

    browsableProfiles = allProfiles.filter(p => p.id !== myProfileId && !myLikedIds.has(p.id));
    currentBrowseIdx = 0;

    const count = allProfiles.length;
    document.getElementById('people-count').textContent = `${count} ${count === 1 ? 'person' : 'people'} joined`;

    renderCurrentCard();
  } catch (e) {
    console.error('load failed', e);
    loadingCard.innerHTML = '<div style="font-size:8px;color:var(--pink)">failed to load — try again</div>';
  }
}

function renderCurrentCard() {
  const stack = document.getElementById('card-stack');
  stack.querySelectorAll('.buddy-card').forEach(c => c.remove());

  if (currentBrowseIdx >= browsableProfiles.length) {
    const empty = document.createElement('div');
    empty.className = 'buddy-card';
    empty.innerHTML = '<div style="font-size:32px;font-family:system-ui">🐡</div><div style="font-size:8px;line-height:1.8">no more people!<br>waiting for more<br>to join...</div>';
    stack.appendChild(empty);
    return;
  }

  const buddy = browsableProfiles[currentBrowseIdx];
  const card = document.createElement('div');
  card.className = 'buddy-card';

  const canvas = document.createElement('canvas');
  canvas.width = 96; canvas.height = 96;
  canvas.style.width = '96px'; canvas.style.height = '96px';
  drawAvatar(canvas, buddy.animal_idx, buddy.palette_idx, 96);

  const nameEl = document.createElement('div');
  nameEl.className = 'name';
  nameEl.textContent = buddy.name;

  const foodsEl = document.createElement('div');
  foodsEl.className = 'foods';
  foodsEl.textContent = buddy.foods.map(foodEmoji).join(' ');

  const tagEl = document.createElement('div');
  tagEl.className = 'tagline';
  tagEl.textContent = buddy.tagline ? `"${buddy.tagline}"` : '';

  card.append(canvas, nameEl, foodsEl, tagEl);
  stack.appendChild(card);

  let startX = 0, currentX = 0, dragging = false;
  card.addEventListener('touchstart', e => { startX = e.touches[0].clientX; dragging = true; });
  card.addEventListener('touchmove', e => {
    if (!dragging) return;
    currentX = e.touches[0].clientX - startX;
    card.style.transform = `translateX(${currentX}px) rotate(${currentX * 0.05}deg)`;
    document.getElementById('hint-nope').style.opacity = currentX < -30 ? 1 : 0;
    document.getElementById('hint-yep').style.opacity = currentX > 30 ? 1 : 0;
  });
  card.addEventListener('touchend', () => {
    dragging = false;
    document.getElementById('hint-nope').style.opacity = 0;
    document.getElementById('hint-yep').style.opacity = 0;
    if (currentX > 80) swipeYes();
    else if (currentX < -80) swipeNo();
    else card.style.transform = '';
    currentX = 0;
  });
}

function animateSwipe(direction, callback) {
  const card = document.querySelector('.buddy-card');
  if (!card) { callback(); return; }
  const x = direction === 'right' ? 400 : -400;
  card.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
  card.style.transform = `translateX(${x}px) rotate(${direction === 'right' ? 20 : -20}deg)`;
  card.style.opacity = '0';
  setTimeout(callback, 300);
}

function swipeNo() {
  animateSwipe('left', () => { currentBrowseIdx++; renderCurrentCard(); });
}

async function swipeYes() {
  const buddy = browsableProfiles[currentBrowseIdx];
  if (!buddy) return;

  animateSwipe('right', async () => {
    try {
      const result = await api('/likes', {
        method: 'POST',
        body: JSON.stringify({ from_id: myProfileId, to_id: buddy.id }),
      });
      myLikedIds.add(buddy.id);

      if (result.matched) {
        const myProfile = allProfiles.find(p => p.id === myProfileId);
        const sharedFoods = buddy.foods.filter(fid => myProfile && myProfile.foods.includes(fid));
        showMatchScreen(buddy, myProfile, sharedFoods);
      } else {
        currentBrowseIdx++;
        renderCurrentCard();
      }
    } catch (e) {
      console.error('like failed', e);
      currentBrowseIdx++;
      renderCurrentCard();
    }
  });
}

// ── MATCH SCREEN ──
function showMatchScreen(buddy, myProfile, sharedFoodIds) {
  showScreen('match-screen');
  spawnConfetti();

  const avatarArea = document.getElementById('match-avatars');
  avatarArea.innerHTML = '';

  const myCanvas = document.createElement('canvas');
  myCanvas.width = 80; myCanvas.height = 80;
  myCanvas.style.width = '80px'; myCanvas.style.height = '80px';
  drawAvatar(myCanvas, myProfile.animal_idx, myProfile.palette_idx, 80);

  const theirCanvas = document.createElement('canvas');
  theirCanvas.width = 80; theirCanvas.height = 80;
  theirCanvas.style.width = '80px'; theirCanvas.style.height = '80px';
  drawAvatar(theirCanvas, buddy.animal_idx, buddy.palette_idx, 80);

  avatarArea.append(myCanvas, theirCanvas);

  const foodsEl = document.getElementById('match-foods');
  if (sharedFoodIds.length > 0) {
    foodsEl.textContent = `you both love ${sharedFoodIds.map(foodEmoji).join(' ')}`;
  } else {
    foodsEl.textContent = "different tastes, same vibes";
  }
}

function continueAfterMatch() {
  currentBrowseIdx++;
  showScreen('browse');
}

// ── MATCHES LIST ──
async function loadMatches() {
  const list = document.getElementById('matches-list');
  list.innerHTML = '<div class="loading">loading...</div>';

  try {
    matchedProfiles = await api('/matches/' + myProfileId);
    matchedProfiles.forEach(p => { if (typeof p.foods === 'string') p.foods = JSON.parse(p.foods); });
  } catch { matchedProfiles = []; }

  list.innerHTML = '';

  if (matchedProfiles.length === 0) {
    list.innerHTML = '<div class="no-matches">no matches yet!<br>keep swiping 🐟</div>';
    return;
  }

  matchedProfiles.forEach(m => {
    const row = document.createElement('div');
    row.className = 'match-row';
    const canvas = document.createElement('canvas');
    canvas.width = 48; canvas.height = 48;
    canvas.style.width = '48px'; canvas.style.height = '48px';
    drawAvatar(canvas, m.animal_idx, m.palette_idx, 48);
    const info = document.createElement('div');
    info.className = 'info';
    info.innerHTML = `<div class="name">${m.name}</div><div class="foods">${m.foods.map(foodEmoji).join(' ')}</div>`;
    row.append(canvas, info);
    list.appendChild(row);
  });
}

// ── ME SCREEN ──
let meAvatarData = null;
const meSelectedFoods = new Set();
let meGridBuilt = false;

function buildMeFoodGrid() {
  if (meGridBuilt) return;
  const grid = document.getElementById('me-food-grid');
  FOODS.forEach(f => {
    const chip = document.createElement('div');
    chip.className = 'food-chip';
    chip.dataset.id = f.id;
    chip.innerHTML = `<span class="emoji">${f.emoji}</span>${f.label}`;
    chip.onclick = () => {
      if (meSelectedFoods.has(f.id)) { meSelectedFoods.delete(f.id); chip.classList.remove('selected'); }
      else { meSelectedFoods.add(f.id); chip.classList.add('selected'); }
    };
    grid.appendChild(chip);
  });
  meGridBuilt = true;
}

function loadMe() {
  buildMeFoodGrid();
  const myProfile = allProfiles.find(p => p.id === myProfileId);
  if (!myProfile) return;

  document.getElementById('me-name').value = myProfile.name;
  document.getElementById('me-tagline').value = myProfile.tagline || '';
  meAvatarData = { animalIdx: myProfile.animal_idx, paletteIdx: myProfile.palette_idx };
  drawAvatar(document.getElementById('me-avatar'), meAvatarData.animalIdx, meAvatarData.paletteIdx, 128);

  // Sync food selections
  meSelectedFoods.clear();
  document.querySelectorAll('#me-food-grid .food-chip').forEach(chip => {
    const id = chip.dataset.id;
    if (myProfile.foods.includes(id)) { meSelectedFoods.add(id); chip.classList.add('selected'); }
    else { chip.classList.remove('selected'); }
  });

  document.getElementById('me-status').textContent = '';
}

function regenMyAvatar() {
  meAvatarData = {
    animalIdx: Math.floor(Math.random() * ANIMALS.length),
    paletteIdx: Math.floor(Math.random() * PALETTES.length),
  };
  drawAvatar(document.getElementById('me-avatar'), meAvatarData.animalIdx, meAvatarData.paletteIdx, 128);
}

async function updateProfile() {
  const name = document.getElementById('me-name').value.trim();
  if (!name) return;
  if (meSelectedFoods.size === 0) return;

  const tagline = document.getElementById('me-tagline').value.trim() || null;
  const status = document.getElementById('me-status');

  try {
    const updated = await api('/profiles/' + myProfileId, {
      method: 'PUT',
      body: JSON.stringify({
        name,
        foods: [...meSelectedFoods],
        animal_idx: meAvatarData.animalIdx,
        palette_idx: meAvatarData.paletteIdx,
        tagline,
      }),
    });

    // Update local cache
    const idx = allProfiles.findIndex(p => p.id === myProfileId);
    if (idx >= 0) {
      allProfiles[idx] = { ...allProfiles[idx], ...updated, foods: [...meSelectedFoods] };
    }

    status.textContent = 'saved ✓';
    setTimeout(() => { status.textContent = ''; }, 2000);
  } catch (e) {
    console.error('update failed', e);
    status.textContent = 'failed to save';
    status.style.color = 'var(--pink)';
  }
}

// ── CONFETTI ──
function spawnConfetti() {
  const colors = ['#f582ae', '#8bd3dd', '#f3d2c1', '#8ac926', '#ffbe0b', '#ff006e'];
  for (let i = 0; i < 30; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.top = '-10px';
    document.body.appendChild(piece);
    const destX = (Math.random() - 0.5) * 200;
    const destY = window.innerHeight + 20;
    const dur = 800 + Math.random() * 1200;
    piece.animate([
      { transform: 'translate(0, 0) rotate(0deg)', opacity: 1 },
      { transform: `translate(${destX}px, ${destY}px) rotate(${360 + Math.random() * 360}deg)`, opacity: 0 },
    ], { duration: dur, easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)' });
    setTimeout(() => piece.remove(), dur);
  }
}
